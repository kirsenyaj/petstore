version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: petstore
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data

  backend:
    build: ./petstore-backend
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/petstore
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_SERVLET_CONTEXT_PATH: /villanueva/api/v1

  frontend:
    build: ./petstore-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  db-data:
